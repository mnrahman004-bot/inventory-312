<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .welcome-container {
            text-align: center;
        }
        .welcome-container h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .welcome-container p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn-login {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>📦 Inventory Management System</h1>
        <p>Efficiently manage your retail inventory with AI-powered demand prediction</p>
        <button class="btn-login" onclick="goToLogin()">Get Started</button>
    </div>

    <script>
        function goToLogin() {
            window.location.href = '/login';
        }

        // Redirect if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
