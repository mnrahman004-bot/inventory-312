<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — StockSense IMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/layout.js"></script>

<div class="modal-overlay" id="stock-modal">
  <div class="modal">
    <div class="modal-header">
      <h4 id="stock-modal-title">Update Stock</h4>
      <button onclick="closeModal('stock-modal')" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="stock-product-id">
      <div class="form-group">
        <label class="form-label">Product</label>
        <input type="text" class="form-control" id="stock-product-name" readonly style="opacity:0.7;">
      </div>
      <div class="form-group">
        <label class="form-label">Change Type</label>
        <select class="form-select" id="stock-type">
          <option value="restock">📦 Restock (Add)</option>
          <option value="adjustment">🔧 Manual Adjustment (Add)</option>
          <option value="damage">🗑️ Damage/Loss (Remove)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" class="form-control" id="stock-qty" min="1" value="1" placeholder="Enter quantity">
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input type="text" class="form-control" id="stock-note" placeholder="Reason for change...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('stock-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateStock()">✅ Update Stock</button>
    </div>
  </div>
</div>

<script>
(async () => {
  await checkAuth();
  renderLayout('/inventory', '🗄️ Stock Control', `
    <div class="grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-header">⚠️ Low Stock Products</div>
        <div class="card-body" id="low-stock-list">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">📋 Recent Inventory Logs</div>
        <div class="table-wrapper" style="max-height:340px;overflow-y:auto;">
          <table>
            <thead><tr><th>Product</th><th>Change</th><th>Type</th><th>Date</th></tr></thead>
            <tbody id="logs-body">
              <tr><td colspan="4" style="text-align:center;padding:20px;"><div class="spinner" style="margin:auto;width:24px;height:24px;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        📦 All Products
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search...">
        </div>
      </div>
      <div class="table-wrapper">
        <table id="inv-table">
          <thead><tr>
            <th>#</th><th>Product</th><th>Category</th><th>Stock</th><th>Threshold</th><th>Status</th><th>Update Stock</th>
          </tr></thead>
          <tbody id="inv-body">
            <tr><td colspan="7" style="text-align:center;padding:40px;"><div class="spinner" style="margin:auto;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `);
  filterTable('search-input', 'inv-table');
  loadInventory();
  loadLogs();
})();

async function loadInventory() {
  const r = await apiFetch('/products');
  if (!r || !r.ok) return;
  const products = r.data;

  // Low stock
  const low = products.filter(p => p.quantity <= p.low_stock_threshold);
  const lowEl = document.getElementById('low-stock-list');
  if (!low.length) {
    lowEl.innerHTML = `<div class="empty-state" style="padding:30px;"><div class="icon">✅</div><h4>All Good!</h4><p>No low stock items.</p></div>`;
  } else {
    lowEl.innerHTML = low.map(p => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:600;">${p.name}</div>
          <div style="font-size:12px;color:var(--text-muted);">${p.category}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          ${stockBadge(p.quantity, p.low_stock_threshold)}
          <button class="btn btn-sm btn-success" onclick="openStockModal(${p.id},'${p.name}')">Restock</button>
        </div>
      </div>
    `).join('');
  }

  // Full table
  const body = document.getElementById('inv-body');
  body.innerHTML = products.map(p => {
    const status = p.quantity <= 0 ? `<span class="badge badge-danger">Out of Stock</span>`
      : p.quantity <= p.low_stock_threshold ? `<span class="badge badge-warning">Low Stock</span>`
      : `<span class="badge badge-success">In Stock</span>`;
    return `
    <tr>
      <td><span class="badge badge-muted">#${p.id}</span></td>
      <td><strong>${p.name}</strong></td>
      <td>${p.category || '—'}</td>
      <td>${stockBadge(p.quantity, p.low_stock_threshold)}</td>
      <td><span class="badge badge-muted">${p.low_stock_threshold}</span></td>
      <td>${status}</td>
      <td>
        <button class="btn btn-sm btn-success" onclick="openStockModal(${p.id},'${p.name}')">📦 Update</button>
      </td>
    </tr>`;
  }).join('');
}

async function loadLogs() {
  const r = await apiFetch('/inventory/logs');
  if (!r || !r.ok) return;
  const logs = r.data;
  const body = document.getElementById('logs-body');
  if (!logs.length) {
    body.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:20px;">No logs yet</td></tr>`;
    return;
  }
  const typeColor = { restock: 'success', sale: 'info', damage: 'danger', adjustment: 'warning' };
  body.innerHTML = logs.slice(0, 30).map(l => `
    <tr>
      <td>${l.product_name}</td>
      <td><span style="color:${l.quantity_change > 0 ? 'var(--success)' : 'var(--danger)'}">
        ${l.quantity_change > 0 ? '+' : ''}${l.quantity_change}
      </span></td>
      <td><span class="badge badge-${typeColor[l.change_type] || 'muted'}">${l.change_type}</span></td>
      <td style="font-size:12px;color:var(--text-muted);">${formatDate(l.log_date)}</td>
    </tr>
  `).join('');
}

function openStockModal(id, name) {
  document.getElementById('stock-product-id').value = id;
  document.getElementById('stock-product-name').value = name;
  document.getElementById('stock-qty').value = 1;
  document.getElementById('stock-note').value = '';
  document.getElementById('stock-type').value = 'restock';
  openModal('stock-modal');
}

async function updateStock() {
  const id = document.getElementById('stock-product-id').value;
  const type = document.getElementById('stock-type').value;
  const qty = parseInt(document.getElementById('stock-qty').value);
  if (!qty || qty < 1) { showToast('Enter a valid quantity', 'error'); return; }

  // Damage/loss subtracts
  const change = ['damage'].includes(type) ? -qty : qty;

  const r = await apiFetch('/inventory/update', {
    method: 'POST',
    body: JSON.stringify({
      product_id: id,
      quantity_change: change,
      change_type: type,
      note: document.getElementById('stock-note').value
    })
  });
  if (r && r.ok) {
    showToast(`Stock updated! New quantity: ${r.data.new_quantity}`, 'success');
    closeModal('stock-modal');
    loadInventory();
    loadLogs();
  } else showToast(r?.data?.error || 'Update failed', 'error');
}
</script>
</body>
</html>
